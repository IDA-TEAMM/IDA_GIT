# Mitras İtki Analizi Raporundan (SolidWorks CFD, Nisan 2026)
catamaran:
  mass: 30.0              # kg - mekanik ekipten onay bekliyor
  inertia_z: 5.0          # kg·m² - mekanik ekipten onay bekliyor
  Xu: -8.0                # N·s/m - saha testinde kalibre edilecek
  Yv: -12.0               # N·s/m
  Nr: -3.0                # N·m·s/rad
  thruster_spacing: 0.596 # m - GERÇEK DEĞER (596.32 mm)
  max_thrust: 30.0        # N - tek motor maks (5000+ RPM)
  # RPM → Newton tablosu:
  # 1000 RPM → 0.85 N
  # 2500 RPM → 6.5 N
  # 5000 RPM → 26.0 N
  # 5500 RPM → ~30 N (max)

# Sinüsoidal dalga bozucusu (Deniz Durumu-2 yaklaşık modeli).
# enabled=false → derivatives(t) tamamen geriye uyumlu (t göz ardı edilir).
# Saha kalibrasyonunda ölçülen dalga spektrumuna göre tune edilecek.
wave:
  enabled: false          # Demo'da true yapılarak Deniz Durumu-2 simüle edilir
  Fx_amp: 5.0             # N, ileri eksen bozucu genliği
  Fx_freq: 0.5            # Hz, ~2 s periyot (DD-2 tipik)
  Mz_amp: 1.0             # N·m, yaw bozucu genliği
  Mz_freq: 0.3            # Hz, ~3.3 s periyot
  phase: 0.0              # rad, sinüs başlangıç fazı
