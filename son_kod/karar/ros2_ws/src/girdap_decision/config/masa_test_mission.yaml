# Girdap İDA — MASA TESTİ görev dosyası (SAHTE VERİ — sahada KULLANMA!)
#
# fake_mavros_publisher.py'nin dikdörtgen turuyla BİREBİR hizalı: sahte GPS
# BASE (40.0, 29.0) noktasından başlar, kuzey→doğu→güney→batı ~28.8 m kenarlar
# gezer. Bu waypoint'ler o turun köşeleridir → mission_manager gerçek varış
# tespiti yapar, hedef index ilerler, yon_setpoint dolu ve anlamlı olur.
#
# Kullanım (Pixhawk'sız masa provası, izole domain önerilir ROS_DOMAIN_ID=77):
#   ros2 launch girdap_decision hardware.launch.py \
#       with_mavros:=false mission_source:=file \
#       mission_file:=masa_test_mission.yaml
#   python3 fake_mavros_publisher.py

home_ref: {lat: 40.0, lon: 29.0}

waypoints:
  - {lat: 40.0002587, lon: 29.0000000, name: "P1-kuzey"}
  - {lat: 40.0002587, lon: 29.0003377, name: "P2-kuzeydogu"}
  - {lat: 40.0000000, lon: 29.0003377, name: "P3-guneydogu"}
  - {lat: 40.0000000, lon: 29.0000000, name: "P4-baslangic"}
