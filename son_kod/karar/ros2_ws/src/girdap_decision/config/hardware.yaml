# Girdap İDA — Gerçek donanım konfigürasyonu (ArduRover + Pixhawk 6C).
#
# hardware.launch.py bu dosyayı Python ile okur:
#   - fcu_url / gcs_url          → mavros apm.launch include argümanları
#   - mode_name / heartbeat_timeout_s / arming_retry_max
#                                → mavros_bridge_node parametre override'ları
#   - topics                     → sensör/perception referans isimleri
#
# NOT: Bu düz (flat) bir launch-config'idir, ROS node-scoped params dosyası
# DEĞİLDİR. Algoritma parametreleri (MPPI K/T, fusion hızları vb.) config/
# params.yaml'da kalır; hardware.launch ikisini birleştirir.

# --- MAVLink bağlantısı (Pixhawk 6C USB/UART) ---
# ArduRover telemetri/USB portu. ACM0 = USB CDC; gerçek baud FC ayarına bağlı.
fcu_url: "serial:///dev/ttyACM0:57600"
gcs_url: ""                       # YKİ köprüsü yok (Şartname 4.1: tek yönlü)

# --- mavros_bridge_node güvenlik/mod ayarları ---
mode_name: "GUIDED"               # ArduRover otonomi modu (kök = tek kaynak)
heartbeat_timeout_s: 5.0          # /mavros/state sessizliği → KILL (~5 heartbeat)
arming_retry_max: 3               # ArduRover pre-arm reddinde yeniden deneme

# --- Algoritma seçimi (video modu ↔ yarışma modu) ---
# Video senaryosu: MAVROS EKF pass-through + düz waypoint + MPPI.
# Yarışma günü: use_isam2=true, use_rrt=true → tam stack aktif.
algorithm:
  use_isam2: false   # false: /mavros/local_position/pose pass-through (iSAM2 yok)
  use_rrt:   false   # false: current_target doğrudan MPPI referansı (RRT* atla)
  use_mppi:  true    # MPPI her iki modda da lokal kontrolcü

# --- planning_node mod geçidi ---
# planning cmd_vel'i yalnız bu modda yayınlar; kök mode_name ile AYNI olmalı.
# Değer verilmezse hardware.launch kök mode_name'i miras aktarır (drift önlenir).
planning:
  mode_name: "GUIDED"

# =========================================================================
# OTONOMİ VİDEOSU — AUTO MODU KARARI (2026-07-13)
# Video görevini FC'nin AUTO'su sürer (GUIDED/MPPI saha testleri videodan
# SONRA). Jetson yığını pasif kayıtçı olarak koşar: FSM+mission_manager görev
# etiketi + Dosya-2/3 üretir, Ekran-2 FC'nin GERÇEK çıkışlarından beslenir.
# Yarışmaya dönüş: start_on_mode "GUIDED", auto_guided true,
# telemetry.setpoint_source "girdap".
# ⚠ OLAY 2026-07-12 dersi (AUTO ile kaçak motor): AUTO'ya YALNIZ FC
#   hafızasında GERÇEK video görevi varken geçilmeli — her oturumda önce
#   QGC Plan → Remove All → gerçek 4 nokta upload + BRD_SAFETY_DEFLT=1.
# =========================================================================
fsm:
  # md 3.3.1(3) başlatma komutu: QGC'den modu AUTO'ya çevirmek hem FC
  # görevini hem FSM'i AYNI komutla başlatır (kenar tetikli; önce ARM).
  start_on_mode: "AUTO"
  # F-V.6 (VİDEO-KATİL fix'i): operatör önce AUTO'ya alıp SONRA arm ederse
  # (QGC Start Mission akışı) mod kenarı oluşmaz → Ekran-2 setpoint'leri boş
  # kalırdı. true → AUTO'dayken ARM kenarı da görevi başlatır. YARIŞMADA
  # false (GUIDED'da arm etmek MPPI'yi kendiliğinden başlatmamalı).
  start_on_arm_in_mode: true
bridge:
  # KRİTİK (B1): true kalırsa köprü görev sırasında (PARKUR1/2/3) modu
  # GUIDED'a ZORLAR → FC AUTO görevinden atılır (mod savaşı). Video AUTO
  # koşusunda mod otoritesi tamamen operatörde olmalı.
  auto_guided: false
  # F-M.6: FC taze bağlantıda ~1 Hz yayınlar (gerçek FCU'da ölçülmüş) →
  # Ekran-2 basamaklı + fusion odom'u keser. Köprü bağlantı kenarında bu
  # hızı ister (oturumluk; FC EEPROM'una yazmaz; yalnız USB kanalı,
  # 868 MHz telemetri hattına yük binmez). 0 = kapalı; ALT SINIR 5.
  stream_rate_hz: 10.0
telemetry:
  # B2: AUTO'da MPPI thrust'ı aracı sürmez → Ekran-2c sahte olurdu.
  # "fc" → thrust /mavros/rc/out (FC'nin gerçek PWM çıkışı, % normalize).
  setpoint_source: "fc"
  fc_cruise_setpoint_mps: 1.0   # QGC WP_SPEED/CRUISE_SPEED ile AYNI değer!
  fc_thrust_left_ch: 1          # SERVO1 = ThrottleLeft(73) — FC ekibi TEYİTLİ
  fc_thrust_right_ch: 3         # SERVO3 = ThrottleRight(74) — FC ekibi TEYİTLİ
  # F-V.7b: waypoint üstünde hedef ofseti ~0 → atan2 açıyı savurur (~180°).
  # Eşiğin altında son açı korunur (Ekran-2b yön-setpoint dürüstlüğü).
  yaw_setpoint_min_dist_m: 0.5

# --- Görev dosyası seçimi (Sprint 4 parkur katmanı) ---
# hardware.launch bu dosya adını config/ altında çözer ve HEM mission_manager
# HEM fsm_node'a geçer (aynı waypoint dizisi → parkur index'leri hizalı).
#   video_mission.yaml       → 4-nokta dikdörtgen, tek parkur (Otonomi videosu)
#   competition_mission.yaml → Parkur-1/2/3 etiketli waypoint dizisi (yarışma)
mission:
  mission_file: "video_mission.yaml"
  # Görev KAYNAĞI (T0-f):
  #   "file" → araç üstü mission_file YAML (offline/geliştirme).
  #   "fc"   → YKİ→Pixhawk→MAVROS /mavros/mission/waypoints. Şartname
  #            md 3.3.1(2) + md 5.5.2.2: görev YKİ'de tanımlanıp İDA'ya
  #            YÜKLENİR → VİDEO ve YARIŞMA günü ZORUNLU mod.
  # VARSAYILAN "fc" (14.07): servis zaten :=fc geçiyordu ama ELLE launch'ta
  # sessizce araç-üstü YAML'a düşülüyordu = md 3.3.1(2) ihlali tuzağı.
  # Offline/geliştirme için launch'ta mission_source:=file verilebilir.
  mission_source: "fc"
  skip_home_seq0: true    # fc: ArduPilot görev index 0 = home konumu, atla
  # F-V.7a: AUTO'da dwell SAHTE beklemedir — FC waypoint'te durmaz; bizim
  # hedef index'imiz dwell kadar geride kalır ve yon_setpoint arkadaki
  # waypoint'i gösterir. Video (AUTO) → 0.0; YARIŞMA (GUIDED/MPPI) → 2.0.
  dwell_time_s: 0.0

# --- Perception: LiDAR engel tespiti (Sprint 1) ---
# perception_lidar_node parametreleri; hardware.launch launch-arg olarak açar
# (CLI override: perception.lidar.z_min:=0.2 vb.). Saha kalibrasyonunda tune.
perception:
  lidar:
    z_min: 0.1              # base_link'e göre su üstü kesim (m)
    z_max: 3.0              # yüksek yansımaları at (m)
    cluster_tolerance: 0.5  # aynı cluster'da olma mesafesi (m)
    min_cluster_size: 5     # bu altı noise
    max_cluster_size: 500   # bu üstü tek engel değil büyük yapı → bölünür (F5.4)
    split_cell_m: 1.0       # büyük küme bölme ızgarası XY hücre kenarı (m)
    max_range: 25.0         # yatay menzil filtresi (m)
    voxel_size: 0.1         # m, clustering öncesi downsample (F5.3; 0=kapalı)
    log_period_s: 5.0       # "K engel" INFO log periyodu
  # Kamera duba tespiti (Sprint 2) — HSV aralıkları dizi olduğundan yalnız
  # params.yaml'da; buradakiler launch-arg olarak açılır (skaler ayarlar).
  camera:
    clahe_clip_limit: 2.0   # su parlaması kontrast dengesi
    clahe_tile: 8           # CLAHE karo ızgarası
    min_area_px: 150        # bu altı kontur noise
    morph_kernel_px: 5      # maske açma/kapama çekirdeği
    use_yolo: false         # hedef sınıfı YOLO katmanı (Parkur-3)
    yolo_model_path: ""     # gerçek .pt yolu (boş = mock inference)
    log_period_s: 5.0
  # Kamera-LiDAR bearing füzyonu (Sprint 3) — kalibrasyon YOK, bkz.
  # prototype/perception/fusion.py docstring (İŞARET KURALI uyarısı).
  fusion:
    bearing_tolerance_rad: 0.15    # ~8.6° eşleşme kabul eşiği
    camera_hfov_rad: 1.2           # OAK-D Lite yatay FOV yaklaşık değeri
    camera_image_width_px: 640     # /perception/buoys bbox normalizasyonu
    camera_image_height_px: 480
    sync_slop_s: 0.1                # ApproximateTimeSynchronizer toleransı
    log_period_s: 5.0

# --- Sensör / perception topic isimleri ---
# gps + imu doğrudan mavros'tan gelir (karar yığını bunlara abone).
# livox + oak sürücüleri ARTIK BU REPODA (ros2_ws/src/ida_topics_yeni,
# 2026-07-14): hardware.launch with_drivers:=true ile başlar ve sürücü
# çıkışları buradaki isimlere REMAP edilir (/lidar/points→/livox/lidar,
# /camera/image_raw→/oak/rgb/image_raw). Dosya-1 mp4 = kamera_kayit_node.
topics:
  livox:     /livox/lidar
  oak_rgb:   /oak/rgb/image_raw
  oak_depth: /oak/stereo/depth
  gps:       /mavros/global_position/global
  imu:       /mavros/imu/data
